<!-- LIGHTNING STORM CANVAS -->
<script>
(function(){
  const canvas=document.getElementById('langCanvas');const ctx=canvas.getContext('2d');
  function resize(){canvas.width=canvas.parentElement.offsetWidth;canvas.height=canvas.parentElement.offsetHeight;}
  resize();window.addEventListener('resize',resize);
  let time=0;
  const sparks=Array.from({length:25},()=>({x:Math.random()*1200,y:Math.random()*280,vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,r:1.5+Math.random()*2,color:Math.random()>.5?'#f5b942':'#6366f1'}));
  function drawLightning(sx,sy,ex,ey,d){if(d<2){ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();return;}const mx=(sx+ex)/2,my=(sy+ey)/2,o=(Math.random()-.5)*d;drawLightning(sx,sy,mx+o,my+o,d/2);drawLightning(mx+o,my+o,ex,ey,d/2);}
  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);time+=0.016;
    ctx.strokeStyle='rgba(99,102,241,0.03)';ctx.lineWidth=1;
    for(let x=0;x<canvas.width;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    sparks.forEach(s=>{s.x+=s.vx;s.y+=s.vy;if(s.x<0||s.x>canvas.width)s.vx*=-1;if(s.y<0||s.y>canvas.height)s.vy*=-1;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=s.color;ctx.shadowColor=s.color;ctx.shadowBlur=8;ctx.fill();ctx.shadowBlur=0;});
    if(Math.random()<0.025){ctx.strokeStyle=Math.random()>.4?'#f5b942':'#ffffff';ctx.lineWidth=2+Math.random()*3;ctx.shadowColor=ctx.strokeStyle;ctx.shadowBlur=15;const sx=Math.random()*canvas.width;drawLightning(sx,0,sx+(Math.random()-.5)*200,canvas.height-40,60);if(Math.random()>.5){ctx.lineWidth=1.2;drawLightning(sx+50,0,sx-50,canvas.height/2,40);}ctx.shadowBlur=0;ctx.fillStyle='rgba(255,255,255,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);}
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
