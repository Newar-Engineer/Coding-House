<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JavaScript Portal — Coding House</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  body {
    animation: pageIn 0.5s ease;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .js-hero-wrap {
    position: relative;
    height: 280px;
    border-radius: 20px;
    overflow: hidden;
    background: linear-gradient(135deg, #090918 0%, #151532 50%, #0d0d21 100%);
    border: 1px solid rgba(99, 102, 241, 0.25);
    margin-bottom: 36px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(99, 102, 241, 0.1);
  }
  
  .js-hero-label {
    position: absolute;
    top: 20px;
    left: 24px;
    z-index: 10;
    pointer-events: none;
  }
  .js-hero-label h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .js-hero-label p {
    font-size: 14px;
    color: #f5b942;
    margin-top: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .level-controller {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 24px;
    border-radius: 14px;
    margin-bottom: 28px;
  }
  .level-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
  }
  .level-selector {
    display: flex;
    gap: 8px;
  }
  .level-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text-mute);
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.3s ease;
  }
  .level-btn.active {
    background: linear-gradient(135deg, #f5b942, #d97706);
    border-color: #f5b942;
    color: #000;
    box-shadow: 0 4px 12px rgba(245, 185, 66, 0.3);
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    transition: all 0.3s ease;
  }
  .topic-card:hover {
    border-color: rgba(245, 185, 66, 0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .topic-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .topic-num {
    font-family: 'JetBrains Mono', monospace;
    color: #f5b942;
    font-weight: 700;
    font-size: 18px;
  }
  .topic-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    flex: 1;
    margin-left: 12px;
  }
  
  .code-container {
    background: #04060b;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    overflow-x: auto;
    margin-bottom: 16px;
    position: relative;
  }
  
  .code-desc {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text-soft);
  }
  .code-usecase {
    font-size: 12px;
    color: #f5b942;
    background: rgba(245, 185, 66, 0.08);
    border-left: 3px solid #f5b942;
    padding: 10px 14px;
    border-radius: 4px;
    margin-top: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo"><span class="mark">&lt;/&gt;</span>Coding House</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#languages">Languages</a></li>
      <li><a href="index.html#tracks">Roadmaps</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#pricing">Pricing</a></li>
    </ul>
    <div class="nav-cta">
      <a href="user/userdashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
      <a href="index.html#languages" class="btn btn-primary btn-sm">Start Learning</a>
      <button class="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>
</header>

<section>
  <div class="wrap" style="padding-top:36px;">
    <div class="breadcrumb"><a href="index.html">Home</a> / <a href="index.html#languages">Languages</a> / JavaScript</div>

    <!-- LIGHTNING HERO AREA -->
    <div class="js-hero-wrap">
      <div class="js-hero-label">
        <p>⚡ Animated JavaScript Portal</p>
        <h1>JavaScript Engine</h1>
      </div>
      <canvas id="jsLightningCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
    </div>

    <!-- LEVEL CONTROLLER -->
    <div class="level-controller">
      <div class="level-title">Select Learning Tier:</div>
      <div class="level-selector">
        <button class="level-btn active" data-level="beg">🟢 Beginner</button>
        <button class="level-btn" data-level="int">🟡 Intermediate</button>
        <button class="level-btn" data-level="pro">🔴 Professional</button>
      </div>
    </div>

    <!-- TOPIC LIST -->
    <div id="topics-root"></div>

  </div>
</section>

<footer>
  <div class="wrap">
    <div class="foot-bottom" style="border-top:none; padding-top:0;">
      <span>© 2026 Coding House. All rights reserved.</span>
      <div class="foot-social">
        <a href="index.html">Back to home</a>
      </div>
    </div>
  </div>
</footer>

<script>
// --- JS TOPICS DATA ---
const topicsData = [
  {
    num: "01",
    title: "Variables, Scope & Memory",
    beg: {
      desc: "Variables hold values. In ES6, use let for standard mutable variables and const for values that do not change.",
      code: `// Simple variables and string logging\nconst platform = "Coding House";\nlet currentStreak = 14;\n\nconsole.log(\`Welcome to \${platform}! Your streak: \${currentStreak}\`);`,
      usecase: "Real-world use: Declaring names, config URLs, or looping counters."
    },
    int: {
      desc: "Intermediate scope uses destructuring to easily extract keys from objects, and manages functional scopes.",
      code: `const user = {\n  id: 101,\n  details: { name: "Shrestha", role: "Pro Member" }\n};\n\n// Destructuring parameters\nconst { details: { name, role } } = user;\nconsole.log(\`User: \${name}, Role: \${role}\`);`,
      usecase: "Real-world use: Parsing incoming JSON response payloads from backend servers."
    },
    pro: {
      desc: "Professional JavaScript uses Proxies to trap object mutations, enabling reactive UI bindings (similar to React/Vue reactivity).",
      code: `const userState = {\n  xp: 2840\n};\n\n// Reactivity via Proxies\nconst reactiveState = new Proxy(userState, {\n  set(target, key, value) {\n    console.log(\`State updated! \${key} went from \${target[key]} to \${value}\`);\n    target[key] = value;\n    // Update UI elements dynamically here\n    return true;\n  }\n});\n\nreactiveState.xp = 2850;`,
      usecase: "Real-world use: Building lightweight client-side state managers or form validatators."
    }
  },
  {
    num: "02",
    title: "Asynchronous JavaScript & Event Loop",
    beg: {
      desc: "Learn standard callback execution timers to understand how JavaScript runs code out-of-order without locking.",
      code: `console.log("Start connection");\n\n// Timeout callback\nsetTimeout(() => {\n  console.log("DB connection finished (async)");\n}, 2000);\n\nconsole.log("Page loaded");`,
      usecase: "Real-world use: Delaying an alert banner or setting intervals."
    },
    int: {
      desc: "Intermediate async uses ES6 Promises and fetch to pull data sequentially from REST API servers.",
      code: `fetch('https://api.github.com/repos/Newar-Engineer/Coding-House')\n  .then(res => res.json())\n  .then(data => {\n    console.log(\`Repository stars: \${data.stargazers_count}\`);\n  })\n  .catch(err => console.error("Request failed:", err));`,
      usecase: "Real-world use: Fetching profile data or loading posts dynamically."
    },
    pro: {
      desc: "Professional async uses AbortControllers to cancel outdated requests, and implements clean async concurrency controls.",
      code: `const controller = new AbortController();\nconst { signal } = controller;\n\nasync function loadUserData(userId) {\n  try {\n    const response = await fetch(\`https://api.example.com/users/\${userId}\`, { signal });\n    return await response.json();\n  } catch (error) {\n    if (error.name === 'AbortError') {\n      console.log('Request cancelled safely by browser state change.');\n    } else {\n      console.error('Fetch error:', error);\n    }\n  }\n}\n\n// Trigger cancel\nsetTimeout(() => controller.abort(), 100);`,
      usecase: "Real-world use: Cancelling search inputs when the user types another character to prevent race conditions."
    }
  },
  {
    num: "03",
    title: "DOM Manipulation & Web Events",
    beg: {
      desc: "Manipulate basic tags. Find elements using IDs and toggle CSS styling classes on click.",
      code: `// Get button and add listener\nconst btn = document.getElementById("action-btn");\nbtn.addEventListener("click", () => {\n  btn.style.backgroundColor = "#10b981";\n  btn.innerText = "Active";\n});`,
      usecase: "Real-world use: Toggling dropdown menus or mobile nav burger toggles."
    },
    int: {
      desc: "Intermediate manipulation uses event delegation, binding listeners to a parent element to manage hundreds of dynamic items.",
      code: `const list = document.getElementById("user-list");\n\n// Delegate click to parent container\nlist.addEventListener("click", (event) => {\n  if (event.target.classList.contains("delete-btn")) {\n    const row = event.target.closest("li");\n    row.remove();\n  }\n});`,
      usecase: "Real-world use: Deleting dynamic cart rows without rebinding click listeners."
    },
    pro: {
      desc: "Professional DOM uses MutationObservers to watch nodes, and uses the Shadow DOM to build isolated Web Components.",
      code: `class CustomBanner extends HTMLElement {\n  constructor() {\n    super();\n    const shadow = this.attachShadow({ mode: 'closed' });\n    const div = document.createElement('div');\n    div.innerHTML = \`\n      <style>\n        .banner { padding: 12px; background: #6366f1; color: white; border-radius: 8px; }\n      </style>\n      <div class="banner"><slot></slot></div>\n    \`;\n    shadow.appendChild(div);\n  }\n}\ncustomElements.define('custom-banner', CustomBanner);`,
      usecase: "Real-world use: Creating reusable design-system buttons that won't be modified by page-wide CSS rules."
    }
  }
];

// --- INTERACTIVE TIER RENDERING ---
let currentLevel = 'beg';

function renderTopics() {
  const root = document.getElementById("topics-root");
  root.innerHTML = topicsData.map(t => {
    const tierData = t[currentLevel];
    return `
      <div class="topic-card">
        <div class="topic-header">
          <span class="topic-num">${t.num}</span>
          <h3 class="topic-title">${t.title}</h3>
          <span style="font-size:12px; color:var(--mute); text-transform:uppercase; font-weight:700;">JS Tier</span>
        </div>
        <p class="code-desc">${tierData.desc}</p>
        <div class="code-container">
          <pre style="margin:0;"><code style="color:#22d3ee;">${escapeHtml(tierData.code)}</code></pre>
        </div>
        <div class="code-usecase">${tierData.usecase}</div>
      </div>
    `;
  }).join("");
}

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

document.querySelectorAll(".level-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentLevel = btn.dataset.level;
    renderTopics();
  });
});

// Initial Render
renderTopics();


// ═══════════════════════ LIGHTNING STORM CANVAS ANIMATION ═══════════════════════
(function() {
  const canvas = document.getElementById('jsLightningCanvas');
  const ctx = canvas.getContext('2d');
  
  function resize() {
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let time = 0;
  
  // Electric sparks
  const sparks = Array.from({ length: 25 }, () => ({
    x: Math.random() * 1200,
    y: Math.random() * 280,
    vx: (Math.random() - 0.5) * 1.5,
    vy: (Math.random() - 0.5) * 1.5,
    r: 1.5 + Math.random() * 2,
    color: Math.random() > 0.5 ? '#f5b942' : '#6366f1'
  }));

  // Generating a randomized lightning path
  function drawLightning(startX, startY, endX, endY, displace) {
    if (displace < 2) {
      ctx.beginPath();
      ctx.moveTo(startX, startY);
      ctx.lineTo(endX, endY);
      ctx.stroke();
      return;
    }
    
    const midX = (startX + endX) / 2;
    const midY = (startY + endY) / 2;
    
    // Add random displacement offset
    const offset = (Math.random() - 0.5) * displace;
    
    // Split bolt into recursive subdivisions
    drawLightning(startX, startY, midX + offset, midY + offset, displace / 2);
    drawLightning(midX + offset, midY + offset, endX, endY, displace / 2);
  }

  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    time += 0.016;

    // Draw grid background rays
    ctx.strokeStyle = 'rgba(99, 102, 241, 0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, 0);
      ctx.lineTo(x, canvas.height);
      ctx.stroke();
    }

    // Draw electric sparks
    sparks.forEach(s => {
      s.x += s.vx;
      s.y += s.vy;
      
      if (s.x < 0 || s.x > canvas.width) s.vx *= -1;
      if (s.y < 0 || s.y > canvas.height) s.vy *= -1;
      
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      
      // Outer aura glow
      ctx.shadowColor = s.color;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0; // reset
    });

    // Occasional bright lightning bolt strike
    // 2.5% chance per frame to spark lightning
    if (Math.random() < 0.025) {
      ctx.strokeStyle = Math.random() > 0.4 ? '#f5b942' : '#ffffff';
      ctx.lineWidth = 2 + Math.random() * 3;
      
      // Set outer glow properties
      ctx.shadowColor = ctx.strokeStyle;
      ctx.shadowBlur = 15;
      
      const startX = Math.random() * canvas.width;
      const startY = 0;
      const endX = startX + (Math.random() - 0.5) * 200;
      const endY = canvas.height - 40;
      
      drawLightning(startX, startY, endX, endY, 60);
      
      // Random sub branch
      if (Math.random() > 0.5) {
        ctx.lineWidth = 1.2;
        drawLightning(startX + 50, startY, endX - 50, endY / 2, 40);
      }
      
      ctx.shadowBlur = 0; // reset
      
      // Brief white overlay screen flash on strike
      ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    requestAnimationFrame(frame);
  }
  
  frame();
})();
</script>
</body>
</html>
