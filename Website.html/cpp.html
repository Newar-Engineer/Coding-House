<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{animation:pageIn .5s ease}@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.lang-hero-wrap{position:relative;height:280px;border-radius:20px;overflow:hidden;background:linear-gradient(135deg,#050520 0%,#0d0d3d 50%,#030318 100%);border:1px solid rgba(99,102,241,.2);margin-bottom:36px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.lang-hero-label{position:absolute;top:20px;left:24px;z-index:10;pointer-events:none}
.lang-hero-label h1{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:700;color:#fff;text-shadow:0 4px 10px rgba(0,0,0,.5)}
.lang-hero-label p{font-size:14px;color:#6366f1;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.level-controller{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);padding:16px 24px;border-radius:14px;margin-bottom:28px}
.level-title{font-family:'Space Grotesk',sans-serif;font-weight:600}.level-selector{display:flex;gap:8px}
.level-btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-mute);cursor:pointer;font-weight:600;font-size:13px;transition:all .3s}
.level-btn.active{background:linear-gradient(135deg,#6366f1,#6366f1dd);border-color:#6366f1;color:#fff;box-shadow:0 4px 12px #6366f14d}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;transition:all .3s}.topic-card:hover{border-color:#6366f166;box-shadow:0 10px 30px rgba(0,0,0,.2)}
.topic-header{display:flex;align-items:center;margin-bottom:16px}.topic-num{font-family:'JetBrains Mono',monospace;color:#6366f1;font-weight:700;font-size:18px}.topic-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;flex:1;margin-left:12px}
.code-container{background:#04060b;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.6;overflow-x:auto;margin-bottom:16px;position:relative}
.code-desc{font-size:13.5px;line-height:1.6;color:var(--text-soft)}.code-usecase{font-size:12px;color:#6366f1;background:#6366f114;border-left:3px solid #6366f1;padding:10px 14px;border-radius:4px;margin-top:12px;font-weight:500}
</style>
</head>
<body>
<header><nav><a href="index.html" class="logo"><span class="mark">&lt;/&gt;</span>Coding House</a><ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="index.html#languages">Languages</a></li><li><a href="index.html#tracks">Roadmaps</a></li><li><a href="index.html#projects">Projects</a></li><li><a href="index.html#pricing">Pricing</a></li></ul><div class="nav-cta"><a href="user/userdashboard.html" class="btn btn-ghost btn-sm">Dashboard</a><a href="index.html#languages" class="btn btn-primary btn-sm">Start Learning</a><button class="burger" aria-label="Menu"><span></span><span></span><span></span></button></div></nav></header>
<section><div class="wrap" style="padding-top:36px;">
<div class="breadcrumb"><a href="index.html">Home</a> / <a href="index.html#languages">Languages</a> / C++</div>
<div class="lang-hero-wrap"><div class="lang-hero-label"><p>🔷 C++ Portal</p><h1>C++ Masterclass</h1></div><canvas id="langCanvas" style="position:absolute;top:0;left:0;width:100%;height:100%;"></canvas></div>
<div class="level-controller"><div class="level-title">Select Learning Tier: <span id="topic-total-badge"></span></div><div class="level-selector"><button class="level-btn active" data-level="beg">🟢 Beginner</button><button class="level-btn" data-level="int">🟡 Intermediate</button><button class="level-btn" data-level="pro">🔴 Professional</button></div></div>
<div id="topics-root"></div>
</div></section>
<footer><div class="wrap"><div class="foot-bottom" style="border-top:none;padding-top:0;"><span>© 2026 Coding House.</span><div class="foot-social"><a href="index.html">Back to home</a></div></div></div></footer>

<script src="js/topic-renderer.js"></script>
<script>var topicRenderer = new TopicRenderer('topics-root', null, { langLabel: 'C++ Tier', accentColor: '#6366f1' });</script>
<script>
(function(){
  var canvas=document.getElementById('langCanvas');var ctx=canvas.getContext('2d');
  function resize(){canvas.width=canvas.parentElement.offsetWidth;canvas.height=canvas.parentElement.offsetHeight}
  resize();window.addEventListener('resize',resize);
  var time=0;
  var words=["std::","vector","class","namespace","virtual","auto","const","move","unique_ptr","shared_ptr","lambda","constexpr"];
  var floaters=Array.from({length:20},function(_,i){return{x:Math.random()*1200,y:Math.random()*280,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.3,label:words[i%words.length],op:Math.random()*.2+.05}});
  var dots=Array.from({length:15},function(){return{x:Math.random()*1200,y:Math.random()*280,vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.6,r:1+Math.random()*3}});
  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);time+=0.016;
    dots.forEach(function(d){
      d.x+=d.vx;d.y+=d.vy;
      if(d.x<0||d.x>canvas.width)d.vx*=-1;if(d.y<0||d.y>canvas.height)d.vy*=-1;
      ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
      ctx.fillStyle='#6366f1';ctx.globalAlpha=.15+Math.sin(time+d.x)*.05;ctx.fill();ctx.globalAlpha=1;
    });
    floaters.forEach(function(f){
      f.x+=f.vx;f.y+=f.vy;
      if(f.x<-60)f.x=canvas.width+60;if(f.x>canvas.width+60)f.x=-60;
      if(f.y<-20)f.y=canvas.height+20;if(f.y>canvas.height+20)f.y=-20;
      ctx.save();ctx.globalAlpha=f.op+Math.sin(time+f.x)*.03;
      ctx.fillStyle='#6366f1';ctx.font='500 10px JetBrains Mono,monospace';
      ctx.fillText(f.label,f.x,f.y);ctx.restore();
    });
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
</body>
</html>
