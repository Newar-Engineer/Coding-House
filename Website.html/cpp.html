<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C++ Portal — Coding House</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  body {
    animation: pageIn 0.5s ease;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .cpp-hero-wrap {
    position: relative;
    height: 280px;
    border-radius: 20px;
    overflow: hidden;
    background: linear-gradient(135deg, #0e121a 0%, #1c2331 50%, #0d1117 100%);
    border: 1px solid rgba(59, 130, 246, 0.2);
    margin-bottom: 36px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(59, 130, 246, 0.1);
  }
  
  .cpp-hero-label {
    position: absolute;
    top: 20px;
    left: 24px;
    z-index: 10;
    pointer-events: none;
  }
  .cpp-hero-label h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .cpp-hero-label p {
    font-size: 14px;
    color: #60a5fa;
    margin-top: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .level-controller {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 24px;
    border-radius: 14px;
    margin-bottom: 28px;
  }
  .level-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
  }
  .level-selector {
    display: flex;
    gap: 8px;
  }
  .level-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text-mute);
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.3s ease;
  }
  .level-btn.active {
    background: linear-gradient(135deg, #60a5fa, #3b82f6);
    border-color: #60a5fa;
    color: #fff;
    box-shadow: 0 4px 12px rgba(96, 165, 250, 0.3);
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    transition: all 0.3s ease;
  }
  .topic-card:hover {
    border-color: rgba(96, 165, 250, 0.4);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .topic-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .topic-num {
    font-family: 'JetBrains Mono', monospace;
    color: #60a5fa;
    font-weight: 700;
    font-size: 18px;
  }
  .topic-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    flex: 1;
    margin-left: 12px;
  }
  
  .code-container {
    background: #04060b;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    overflow-x: auto;
    margin-bottom: 16px;
    position: relative;
  }
  
  .code-desc {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text-soft);
  }
  .code-usecase {
    font-size: 12px;
    color: #60a5fa;
    background: rgba(96, 165, 250, 0.08);
    border-left: 3px solid #60a5fa;
    padding: 10px 14px;
    border-radius: 4px;
    margin-top: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo"><span class="mark">&lt;/&gt;</span>Coding House</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#languages">Languages</a></li>
      <li><a href="index.html#tracks">Roadmaps</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#pricing">Pricing</a></li>
    </ul>
    <div class="nav-cta">
      <a href="user/userdashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
      <a href="index.html#languages" class="btn btn-primary btn-sm">Start Learning</a>
      <button class="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>
</header>

<section>
  <div class="wrap" style="padding-top:36px;">
    <div class="breadcrumb"><a href="index.html">Home</a> / <a href="index.html#languages">Languages</a> / C++</div>

    <!-- ROTATING GEARS HERO AREA -->
    <div class="cpp-hero-wrap">
      <div class="cpp-hero-label">
        <p>⚙️ High Performance C++ Portal</p>
        <h1>C++ Architecture</h1>
      </div>
      <canvas id="cppGearsCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
    </div>

    <!-- LEVEL CONTROLLER -->
    <div class="level-controller">
      <div class="level-title">Select Learning Tier:</div>
      <div class="level-selector">
        <button class="level-btn active" data-level="beg">🟢 Beginner</button>
        <button class="level-btn" data-level="int">🟡 Intermediate</button>
        <button class="level-btn" data-level="pro">🔴 Professional</button>
      </div>
    </div>

    <!-- TOPIC LIST -->
    <div id="topics-root"></div>

  </div>
</section>

<footer>
  <div class="wrap">
    <div class="foot-bottom" style="border-top:none; padding-top:0;">
      <span>© 2026 Coding House. All rights reserved.</span>
      <div class="foot-social">
        <a href="index.html">Back to home</a>
      </div>
    </div>
  </div>
</footer>

<script>
// --- C++ TOPICS DATA ---
const topicsData = [
  {
    num: "01",
    title: "Syntax & Standard Output",
    beg: {
      desc: "C++ programs use the standard iostream header to write variables to the terminal stream.",
      code: `#include <iostream>\n\nint main() {\n    std::cout << "Welcome to Coding House C++!" << std::endl;\n    return 0;\n}`,
      usecase: "Real-world use: Outputting startup execution codes or configurations."
    },
    int: {
      desc: "Intermediate code structures code inside namespace blocks to prevent symbol conflicts in multi-file projects.",
      code: `#include <iostream>\n#include <string>\n\nnamespace App {\n    void PrintLog(const std::string& msg) {\n        std::cout << "[LOG] " << msg << "\\n";\n    }\n}`,
      usecase: "Real-world use: Organising domain properties in complex system frameworks."
    },
    pro: {
      desc: "Professional C++ uses static compile-time validations (concepts and constraints introduced in C++20) to filter templated parameters before binary compilation.",
      code: `#include <iostream>\n#include <concepts>\n\n// Compile-time checks for numeric data\ntemplate <typename T>\nrequires std::integral<T> || std::floating_point<T>\nT CalculateDouble(T val) {\n    return val * 2;\n}\n\nint main() {\n    std::cout << CalculateDouble(4.5) << "\\n";\n}`,
      usecase: "Real-world use: Compiling highly-optimized graphics matrices or embedded signals data libraries."
    }
  },
  {
    num: "02",
    title: "Pointers & Memory Allocation",
    beg: {
      desc: "Pointers store the direct memory addresses of standard variables. Dereference points back to values.",
      code: `int score = 2840;\nint* ptr = &score;\n\nstd::cout << "Address: " << ptr << "\\n";\nstd::cout << "Value: " << *ptr << "\\n";`,
      usecase: "Real-world use: Passing addresses directly to avoid copy overhead."
    },
    int: {
      desc: "Intermediate allocations use dynamically allocated memory pools with 'new' and 'delete' rules.",
      code: `// Heap allocation\nint* dynamicArray = new int[5];\nfor (int i = 0; i < 5; ++i) {\n    dynamicArray[i] = i * 10;\n}\n\n// Must clean up memory to prevent leaks!\ndelete[] dynamicArray;`,
      usecase: "Real-world use: Scaling dynamic arrays when size is determined during execution."
    },
    pro: {
      desc: "Professional C++ utilizes RAII rules with smart pointers (`unique_ptr` & `shared_ptr`) to automate garbage collection at zero performance cost.",
      code: `#include <memory>\n#include <iostream>\n\nclass DBConnection {\npublic:\n    void Query() { std::cout << "Querying...\\n"; }\n};\n\nvoid RunTransaction() {\n    // Scoped smart pointer auto-deallocates when function exits\n    std::unique_ptr<DBConnection> conn = std::make_unique<DBConnection>();\n    conn->Query();\n}`,
      usecase: "Real-world use: Structuring leak-proof database connection pools and file handlers in backend servers."
    }
  }
];

// --- INTERACTIVE TIER RENDERING ---
let currentLevel = 'beg';

function renderTopics() {
  const root = document.getElementById("topics-root");
  root.innerHTML = topicsData.map(t => {
    const tierData = t[currentLevel];
    return `
      <div class="topic-card">
        <div class="topic-header">
          <span class="topic-num">${t.num}</span>
          <h3 class="topic-title">${t.title}</h3>
          <span style="font-size:12px; color:var(--mute); text-transform:uppercase; font-weight:700;">C++ Tier</span>
        </div>
        <p class="code-desc">${tierData.desc}</p>
        <div class="code-container">
          <pre style="margin:0;"><code style="color:#22d3ee;">${escapeHtml(tierData.code)}</code></pre>
        </div>
        <div class="code-usecase">${tierData.usecase}</div>
      </div>
    `;
  }).join("");
}

function escapeHtml(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

document.querySelectorAll(".level-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentLevel = btn.dataset.level;
    renderTopics();
  });
});

renderTopics();


// ═══════════════════════ ROTATING METALLIC GEARS CANVAS ═══════════════════════
(function() {
  const canvas = document.getElementById('cppGearsCanvas');
  const ctx = canvas.getContext('2d');
  
  function resize() {
    canvas.width = canvas.parentElement.offsetWidth;
    canvas.height = canvas.parentElement.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  let angle = 0;
  
  function drawGear(cx, cy, radius, teeth, teethHeight, speedMultiplier, color) {
    const rot = angle * speedMultiplier;
    
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    
    ctx.fillStyle = color;
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
    ctx.lineWidth = 1.5;
    
    // Draw gear outer profile with teeth
    ctx.beginPath();
    for (let i = 0; i < teeth; i++) {
      const theta = (i / teeth) * Math.PI * 2;
      const nextTheta = ((i + 0.5) / teeth) * Math.PI * 2;
      const followTheta = ((i + 1) / teeth) * Math.PI * 2;
      
      const innerR = radius - teethHeight;
      const outerR = radius;
      
      // Tooth slope lines
      ctx.lineTo(Math.cos(theta) * innerR, Math.sin(theta) * innerR);
      ctx.lineTo(Math.cos(theta + 0.1) * outerR, Math.sin(theta + 0.1) * outerR);
      ctx.lineTo(Math.cos(nextTheta - 0.1) * outerR, Math.sin(nextTheta - 0.1) * outerR);
      ctx.lineTo(Math.cos(nextTheta) * innerR, Math.sin(nextTheta) * innerR);
      ctx.lineTo(Math.cos(followTheta) * innerR, Math.sin(followTheta) * innerR);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    // Center circular hole
    ctx.fillStyle = '#0e121a'; // Match background
    ctx.beginPath();
    ctx.arc(0, 0, radius * 0.35, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    
    // Draw keyway slots in the center hole for detail
    ctx.fillStyle = color;
    ctx.fillRect(-4, -radius * 0.45, 8, radius * 0.2);

    ctx.restore();
  }

  function frame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    angle += 0.012; // gear speed

    // Gear placement coordinates
    const g1X = canvas.width - 240;
    const g1Y = 150;
    const g2X = canvas.width - 120;
    const g2Y = 80;

    // Draw mesh connection shadows
    ctx.shadowColor = 'rgba(0, 0, 0, 0.5)';
    ctx.shadowBlur = 10;
    ctx.shadowOffsetY = 6;

    // Draw main driving gear
    drawGear(g1X, g1Y, 70, 24, 12, 1, 'rgba(100, 110, 130, 0.85)'); // Dark steel
    
    // Draw secondary driven gear (rotates opposite direction, interlocking)
    drawGear(g2X, g2Y, 50, 16, 10, -1.5, 'rgba(140, 150, 170, 0.9)'); // Bright steel

    // Reset shadow mapping
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    requestAnimationFrame(frame);
  }
  
  frame();
})();
</script>
</body>
</html>
