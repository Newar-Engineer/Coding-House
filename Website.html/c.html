<style>
body{animation:pageIn .5s ease}@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.lang-hero-wrap{position:relative;height:280px;border-radius:20px;overflow:hidden;background:linear-gradient(135deg,#020810 0%,#0a1628 50%,#040b15 100%);border:1px solid rgba(34,211,238,.2);margin-bottom:36px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.lang-hero-label{position:absolute;top:20px;left:24px;z-index:10;pointer-events:none}
.lang-hero-label h1{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:700;color:#fff;text-shadow:0 4px 10px rgba(0,0,0,.5)}
.lang-hero-label p{font-size:14px;color:#22d3ee;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:.1em}
.level-controller{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);padding:16px 24px;border-radius:14px;margin-bottom:28px}
.level-title{font-family:'Space Grotesk',sans-serif;font-weight:600}.level-selector{display:flex;gap:8px}
.level-btn{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:transparent;color:var(--text-mute);cursor:pointer;font-weight:600;font-size:13px;transition:all .3s}
.level-btn.active{background:linear-gradient(135deg,#22d3ee,#06b6d4);border-color:#22d3ee;color:#fff;box-shadow:0 4px 12px rgba(34,211,238,.3)}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;transition:all .3s}.topic-card:hover{border-color:rgba(34,211,238,.4);box-shadow:0 10px 30px rgba(0,0,0,.2)}
.topic-header{display:flex;align-items:center;margin-bottom:16px}.topic-num{font-family:'JetBrains Mono',monospace;color:#22d3ee;font-weight:700;font-size:18px}.topic-title{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;flex:1;margin-left:12px}
.code-container{background:#04060b;border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:16px;font-family:'JetBrains Mono',monospace;font-size:13.5px;line-height:1.6;overflow-x:auto;margin-bottom:16px;position:relative}
.code-desc{font-size:13.5px;line-height:1.6;color:var(--text-soft)}.code-usecase{font-size:12px;color:#22d3ee;background:rgba(34,211,238,.08);border-left:3px solid #22d3ee;padding:10px 14px;border-radius:4px;margin-top:12px;font-weight:500}
</style>

<script src="js/topic-renderer.js"></script>
<script>var topicRenderer = new TopicRenderer('topics-root', null, { langLabel: 'C Tier', accentColor: '#22d3ee' });</script>
<script>
(function(){
  const canvas=document.getElementById('langCanvas');const ctx=canvas.getContext('2d');
  function resize(){canvas.width=canvas.parentElement.offsetWidth;canvas.height=canvas.parentElement.offsetHeight}
  resize();window.addEventListener('resize',resize);
  let time=0;
  const ptrs=Array.from({length:30},()=>({x:Math.random()*1200,y:Math.random()*280,vx:(Math.random()-.5)*.6,vy:(Math.random()-.5)*.4,label:['0x'+Math.floor(Math.random()*65535).toString(16),'*ptr','&var','malloc','free','sizeof','NULL','int*','char*','void*'][Math.floor(Math.random()*10)],op:Math.random()*.2+.05}));
  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);time+=0.016;
    // Grid
    ctx.strokeStyle='rgba(34,211,238,0.03)';ctx.lineWidth=1;
    for(let x=0;x<canvas.width;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
    for(let y=0;y<canvas.height;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
    // Pointer labels
    ptrs.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<-60)p.x=canvas.width+60;if(p.x>canvas.width+60)p.x=-60;
      if(p.y<-20)p.y=canvas.height+20;if(p.y>canvas.height+20)p.y=-20;
      ctx.save();ctx.globalAlpha=p.op+Math.sin(time+p.x)*.03;
      ctx.fillStyle='#22d3ee';ctx.font='500 10px JetBrains Mono,monospace';
      ctx.fillText(p.label,p.x,p.y);ctx.restore();
    });
    // Memory blocks visualization
    for(let i=0;i<8;i++){
      const bx=canvas.width-200+i*20;const by=canvas.height-60;
      ctx.fillStyle=`rgba(34,211,238,${.05+Math.sin(time*2+i)*.03})`;
      ctx.fillRect(bx,by,18,30);
      ctx.strokeStyle='rgba(34,211,238,0.15)';ctx.strokeRect(bx,by,18,30);
    }
    // Arrows between blocks
    for(let i=0;i<6;i++){
      const sx=canvas.width-190+i*20+9,sy=canvas.height-45;
      ctx.strokeStyle=`rgba(34,211,238,${.1+Math.sin(time*3+i)*.05})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+20,sy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+17,sy-3);ctx.lineTo(sx+20,sy);ctx.lineTo(sx+17,sy+3);ctx.stroke();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
