<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C# Portal — Coding House</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
<style>
  body {
    animation: pageIn 0.5s ease;
  }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lang-hero-wrap {
    position: relative;
    height: 280px;
    border-radius: 20px;
    overflow: hidden;
    background: linear-gradient(135deg, #070913 0%, #11152c 50%, #080a14 100%);
    border: 1px solid rgba(99, 102, 241, 0.2);
    margin-bottom: 36px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 50px rgba(99, 102, 241, 0.1);
  }
  
  .lang-hero-label {
    position: absolute;
    top: 20px;
    left: 24px;
    z-index: 10;
    pointer-events: none;
  }
  .lang-hero-label h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.2rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 4px 10px rgba(0,0,0,0.5);
  }
  .lang-hero-label p {
    font-size: 14px;
    color: var(--primary2);
    margin-top: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .level-controller {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px 24px;
    border-radius: 14px;
    margin-bottom: 28px;
  }
  .level-title {
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
  }
  .level-selector {
    display: flex;
    gap: 8px;
  }
  .level-btn {
    padding: 8px 16px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--text-mute);
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
    transition: all 0.3s ease;
  }
  .level-btn.active {
    background: linear-gradient(135deg, var(--primary), var(--primary2));
    border-color: var(--primary);
    color: #fff;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
  }

  .topic-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px;
    transition: all 0.3s ease;
  }
  .topic-card:hover {
    border-color: rgba(99, 102, 241, 0.3);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }
  .topic-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .topic-num {
    font-family: 'JetBrains Mono', monospace;
    color: var(--primary2);
    font-weight: 700;
    font-size: 18px;
  }
  .topic-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    font-weight: 700;
    flex: 1;
    margin-left: 12px;
  }
  
  .code-container {
    background: #04060b;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.6;
    overflow-x: auto;
    margin-bottom: 16px;
    position: relative;
  }
  
  .code-desc {
    font-size: 13.5px;
    line-height: 1.6;
    color: var(--text-soft);
  }
  .code-usecase {
    font-size: 12px;
    color: var(--primary2);
    background: rgba(99, 102, 241, 0.08);
    border-left: 3px solid var(--primary);
    padding: 10px 14px;
    border-radius: 4px;
    margin-top: 12px;
    font-weight: 500;
  }
</style>
</head>
<body>

<header>
  <nav>
    <a href="index.html" class="logo"><span class="mark">&lt;/&gt;</span>Coding House</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#languages">Languages</a></li>
      <li><a href="index.html#tracks">Roadmaps</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="index.html#pricing">Pricing</a></li>
    </ul>
    <div class="nav-cta">
      <a href="user/userdashboard.html" class="btn btn-ghost btn-sm">Dashboard</a>
      <a href="index.html#languages" class="btn btn-primary btn-sm">Start Learning</a>
      <button class="burger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>
</header>

<section>
  <div class="wrap" style="padding-top:36px;">
    <div class="breadcrumb"><a href="index.html">Home</a> / <a href="index.html#languages">Languages</a> / C#</div>

    <!-- CANVAS HERO AREA -->
    <div class="lang-hero-wrap">
      <div class="lang-hero-label">
        <p>🌐 Animated C# Portal</p>
        <h1>C# Masterclass</h1>
      </div>
      <canvas id="langCanvas" style="position:absolute; top:0; left:0; width:100%; height:100%;"></canvas>
    </div>

    <!-- LEVEL CONTROLLER -->
    <div class="level-controller">
      <div class="level-title">Select Learning Tier:</div>
      <div class="level-selector">
        <button class="level-btn active" data-level="beg">🟢 Beginner</button>
        <button class="level-btn" data-level="int">🟡 Intermediate</button>
        <button class="level-btn" data-level="pro">🔴 Professional</button>
      </div>
    </div>

    <!-- TOPIC LIST -->
    <div id="topics-root">
      
    <div class="topic-card">
      <div class="topic-header">
        <span class="topic-num">01</span>
        <h3 class="topic-title">Properties & Getter/Setter</h3>
        <span style="font-size:12px; color:var(--mute); text-transform:uppercase; font-weight:700;">C# Tier</span>
      </div>
      <p class="code-desc" id="desc-01"></p>
      <div class="code-container">
        <pre style="margin:0;"><code id="code-01" style="color:#22d3ee;"></code></pre>
      </div>
      <div class="code-usecase" id="use-01"></div>
    </div>
  
    </div>

  </div>
</section>

<footer>
  <div class="wrap">
    <div class="foot-bottom" style="border-top:none; padding-top:0;">
      <span>© 2026 Coding House. All rights reserved.</span>
      <div class="foot-social">
        <a href="index.html">Back to home</a>
      </div>
    </div>
  </div>
</footer>

<script>
// --- LEVEL RENDER LOGIC ---
const topics = [{"num":"01","title":"Properties & Getter/Setter","beg":{"desc":"C# features automatic properties to cleanly bind class member fields.","code":"public class Profile {\n    public string Name { get; set; }\n}","usecase":"Real-world use: Storing clean name parameters."},"int":{"desc":"Intermediate properties use customized backing fields for validating values before changes.","code":"private int _age;\npublic int Age {\n    get => _age;\n    set => _age = value < 0 ? 0 : value;\n}","usecase":"Real-world use: Preventing negative values in age input forms."},"pro":{"desc":"Professional C# uses modern records (C# 9+) with init-only setters for robust immutable properties.","code":"public record ServerConfig(\n    string ConnectionString,\n    int MaxConnections\n) {\n    public bool IsSecure => ConnectionString.Contains(\"SSL=true\");\n}","usecase":"Real-world use: Safely sharing database setup configurations."}}];
let currentLevel = 'beg';

function render() {
  topics.forEach(t => {
    const data = t[currentLevel];
    document.getElementById(`desc-${t.num}`).innerText = data.desc;
    document.getElementById(`code-${t.num}`).innerText = data.code;
    document.getElementById(`use-${t.num}`).innerText = data.usecase;
  });
}

document.querySelectorAll(".level-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".level-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    currentLevel = btn.dataset.level;
    render();
  });
});

render();

// ═══════════════════════ THEMATIC CANVAS ANIMATION ═══════════════════════
(function() {
  
      // ROTATING DIGITAL CRYSTAL
      const canvas = document.getElementById('langCanvas');
      const ctx = canvas.getContext('2d');
      function resize() {
        canvas.width = canvas.parentElement.offsetWidth;
        canvas.height = canvas.parentElement.offsetHeight;
      }
      resize();
      window.addEventListener('resize', resize);
      let angle = 0;
      function frame() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        angle += 0.015;
        const cx = canvas.width - 150;
        const cy = 120;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(angle);
        ctx.strokeStyle = '#8b5cf6';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const theta = (i / 6) * Math.PI * 2;
          ctx.lineTo(Math.cos(theta)*55, Math.sin(theta)*55);
        }
        ctx.closePath();
        ctx.stroke();
        ctx.restore();
        requestAnimationFrame(frame);
      }
      frame();
    
})();
</script>
</body>
</html>
