<svg class="codinghouse-logo" viewBox="0 0 100 100" width="100" height="100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Coding House">
  <style>
    .logo-art {
      filter: drop-shadow(0 0 4px rgba(168, 85, 247, 0.4));
      transform-origin: 50px 50px;
      animation: logo-float 4s ease-in-out infinite;
    }

    @keyframes logo-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-3px) rotate(0.5deg); }
    }

    .logo-shell {
      stroke-dasharray: 300;
      stroke-dashoffset: 300;
      animation: draw-shell 2.5s ease-out forwards, shell-glow 4s ease-in-out infinite 2.5s;
    }

    @keyframes draw-shell {
      to { stroke-dashoffset: 0; }
    }

    @keyframes shell-glow {
      0%, 100% { opacity: 0.8; stroke-width: 6; }
      50% { opacity: 1; stroke-width: 7; filter: drop-shadow(0 0 3px rgba(168, 85, 247, 0.7)); }
    }

    .logo-roof {
      stroke-dasharray: 100;
      stroke-dashoffset: 100;
      animation: draw-roof 1.8s ease-out forwards 0.4s;
    }

    @keyframes draw-roof {
      to { stroke-dashoffset: 0; }
    }

    .logo-bracket-left {
      animation: pulse-left 2s infinite ease-in-out;
    }

    .logo-bracket-right {
      animation: pulse-right 2s infinite ease-in-out;
    }

    @keyframes pulse-left {
      0%, 100% { transform: translateX(0); opacity: 0.7; }
      50% { transform: translateX(-1.5px); opacity: 1; }
    }

    @keyframes pulse-right {
      0%, 100% { transform: translateX(0); opacity: 0.7; }
      50% { transform: translateX(1.5px); opacity: 1; }
    }

    .logo-cursor {
      animation: cursor-blink 1s step-end infinite;
      transform-origin: center;
    }

    @keyframes cursor-blink {
      0%, 100% { opacity: 0.1; }
      50% { opacity: 1; }
    }
  </style>
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#a855f7" />
      <stop offset="100%" stop-color="#f43f5e" />
    </linearGradient>
  </defs>
  <g class="logo-art">
    <polygon points="50,5 90,25 90,75 50,95 10,75 10,25" fill="none" stroke="url(#logoGrad)" stroke-width="6" class="logo-shell" />
    <path d="M50,25 L75,44 L75,72 L25,72 L25,44 Z" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-dasharray="2 2" />
    <path d="M32,48 L50,32 L68,48" fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" class="logo-roof" />
    <path d="M38,60 L44,54 L38,48" fill="none" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" class="logo-bracket-left" />
    <path d="M62,60 L56,54 L62,48" fill="none" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" class="logo-bracket-right" />
    <line x1="50" y1="46" x2="50" y2="62" stroke="url(#logoGrad)" stroke-width="5" stroke-linecap="round" class="logo-cursor" />
  </g>
</svg>
