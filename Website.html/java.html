  .lang-hero-label h1{font-family:'Space Grotesk',sans-serif;font-size:2.2rem;font-weight:700;color:#fff;text-shadow:0 4px 10px rgba(0,0,0,.5)}

  .level-btn.active{background:linear-gradient(135deg,#ef4444,#dc2626);border-color:#ef4444;color:#fff;box-shadow:0 4px 12px rgba(239,68,68,.3)}

<!-- Coffee cup canvas animation -->
<script>
(function(){
  const canvas=document.getElementById('langCanvas');const ctx=canvas.getContext('2d');
  function resize(){canvas.width=canvas.parentElement.offsetWidth;canvas.height=canvas.parentElement.offsetHeight}
  resize();window.addEventListener('resize',resize);
  let time=0;
  const particles=Array.from({length:20},()=>({x:Math.random()*1200,y:Math.random()*280,vx:(Math.random()-.5)*.3,vy:-(Math.random()*.5+.2),size:2+Math.random()*3,op:Math.random()*.3+.1}));
  const codeSnippets=['class','void','public','static','int','String','new','extends','import','System.out','final','abstract','interface'];
  const floaters=Array.from({length:12},(_, i)=>({x:Math.random()*1200,y:Math.random()*280,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.3,label:codeSnippets[i%codeSnippets.length],op:Math.random()*.2+.05}));
  function frame(){
    ctx.clearRect(0,0,canvas.width,canvas.height);time+=0.016;
    // Draw steam particles (rising)
    particles.forEach(p=>{
      p.x+=p.vx+Math.sin(time*2+p.x)*.2;p.y+=p.vy;
      if(p.y<-10){p.y=canvas.height+10;p.x=canvas.width*.3+Math.random()*canvas.width*.4;}
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(239,68,68,${p.op+Math.sin(time+p.x)*.05})`;ctx.fill();
    });
    // Draw floating code keywords
    floaters.forEach(f=>{
      f.x+=f.vx;f.y+=f.vy;
      if(f.x<-60)f.x=canvas.width+60;if(f.x>canvas.width+60)f.x=-60;
      if(f.y<-20)f.y=canvas.height+20;if(f.y>canvas.height+20)f.y=-20;
      ctx.save();ctx.globalAlpha=f.op+Math.sin(time+f.x)*.03;
      ctx.fillStyle='#ef4444';ctx.font='500 11px JetBrains Mono,monospace';
      ctx.fillText(f.label,f.x,f.y);ctx.restore();
    });
    // Draw coffee cup silhouette
    const cx=canvas.width-140,cy=canvas.height-80;
    ctx.strokeStyle='rgba(239,68,68,0.15)';ctx.lineWidth=2;
    ctx.beginPath();ctx.ellipse(cx,cy-30,35,45,0,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.ellipse(cx+38,cy-30,12,18,0,-Math.PI*.3,Math.PI*.3);ctx.stroke();
    // Steam curls
    for(let i=0;i<3;i++){
      const sx=cx-15+i*15;
      ctx.beginPath();ctx.moveTo(sx,cy-75);
      ctx.quadraticCurveTo(sx+8*Math.sin(time*3+i),cy-95,sx+4,cy-115+Math.sin(time*2+i)*5);
      ctx.strokeStyle=`rgba(239,68,68,${.1+Math.sin(time+i)*.05})`;ctx.lineWidth=1.5;ctx.stroke();
    }
    requestAnimationFrame(frame);
  }
  frame();
})();
</script>
