(function(){var c=document.getElementById('langCanvas'),x=c.getContext('2d');function r(){c.width=c.parentElement.offsetWidth;c.height=c.parentElement.offsetHeight}r();window.addEventListener('resize',r);var t=0,w=["function","library","data.frame","list","vector","matrix","apply","ggplot","dplyr","if","else","return"];var fl=Array.from({length:20},function(_,i){return{x:Math.random()*1200,y:Math.random()*280,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.3,l:w[i%w.length],o:Math.random()*.2+.05}});var dt=Array.from({length:15},function(){return{x:Math.random()*1200,y:Math.random()*280,vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.6,r:1+Math.random()*3}});function f(){x.clearRect(0,0,c.width,c.height);t+=.016;dt.forEach(function(d){d.x+=d.vx;d.y+=d.vy;if(d.x<0||d.x>c.width)d.vx*=-1;if(d.y<0||d.y>c.height)d.vy*=-1;x.beginPath();x.arc(d.x,d.y,d.r,0,Math.PI*2);x.fillStyle='#276bcc';x.globalAlpha=.15+Math.sin(t+d.x)*.05;x.fill();x.globalAlpha=1});fl.forEach(function(f){f.x+=f.vx;f.y+=f.vy;if(f.x<-60)f.x=c.width+60;if(f.x>c.width+60)f.x=-60;if(f.y<-20)f.y=c.height+20;if(f.y>c.height+20)f.y=-20;x.save();x.globalAlpha=f.o+Math.sin(t+f.x)*.03;x.fillStyle='#276bcc';x.font='500 10px JetBrains Mono,monospace';x.fillText(f.l,f.x,f.y);x.restore()});requestAnimationFrame(f)}f()})();
