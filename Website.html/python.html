<!-- SNAKE CANVAS ANIMATION -->
<script>
(function() {
  const canvas = document.getElementById('pythonSnakeCanvas');
  const ctx = canvas.getContext('2d');
  function resize() { canvas.width = canvas.parentElement.offsetWidth; canvas.height = canvas.parentElement.offsetHeight; }
  resize(); window.addEventListener('resize', resize);
  const segmentCount = 42;
  const segments = [];
  for(let i = 0; i < segmentCount; i++) segments.push({ x: canvas.width / 2, y: canvas.height / 2 });
  let time = 0;
  const particles = Array.from({ length: 15 }, () => ({
    x: Math.random() * 2000, y: Math.random() * 300,
    vx: -(0.2 + Math.random() * 0.3), size: 1 + Math.random() * 3, op: 0.1 + Math.random() * 0.4
  }));
  function drawScale(x, y, r, i) {
    ctx.fillStyle = i % 2 === 0 ? '#1d3516' : '#d9a73d';
    ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
    if (i > 1 && i < segmentCount - 2) {
      ctx.fillStyle = '#0b160a'; ctx.beginPath();
      ctx.ellipse(x, y, r * 0.6, r * 0.4, Math.sin(i * 0.3), 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#ebd18a'; ctx.lineWidth = 1; ctx.stroke();
    }
  }
  function renderFrame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    time += 0.016;
    particles.forEach(p => {
      p.x += p.vx; if (p.x < -10) p.x = canvas.width + 10;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(16, 185, 129, ${p.op})`; ctx.fill();
    });
    const targetX = canvas.width / 2 + Math.cos(time * 0.6) * (canvas.width * 0.35);
    const targetY = canvas.height / 2 + Math.sin(time * 1.3) * (canvas.height * 0.22);
    const head = segments[0];
    const dx = targetX - head.x, dy = targetY - head.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 5) { head.x += (dx/dist)*2.8; head.y += (dy/dist)*2.8; }
    for(let i = 1; i < segmentCount; i++) {
      const prev = segments[i-1], curr = segments[i];
      const sDx = prev.x-curr.x, sDy = prev.y-curr.y;
      const d = Math.sqrt(sDx*sDx+sDy*sDy)||1;
      const spacer = 7.5;
      if (d > spacer) {
        const wiggle = Math.sin(time*6-i*0.3)*0.8;
        curr.x += (sDx/d)*(d-spacer)+Math.cos(time+i)*wiggle;
        curr.y += (sDy/d)*(d-spacer)+Math.sin(time+i)*wiggle;
      }
    }
    ctx.save(); ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=12; ctx.shadowOffsetY=8; ctx.shadowOffsetX=3;
    for(let i = segmentCount-1; i >= 0; i--) {
      let r = 16.5;
      if(i<8) r=11+i*0.7; else if(i>25){const p=(i-25)/(segmentCount-25);r=16.5-p*13;}
      r=Math.max(r,2.5); drawScale(segments[i].x,segments[i].y,r,i);
    }
    ctx.restore();
    const hs=segments[0],ns=segments[1];
    const angle=Math.atan2(hs.y-ns.y,hs.x-ns.x);
    ctx.save(); ctx.translate(hs.x,hs.y); ctx.rotate(angle);
    const tp=Math.sin(time*12);
    if(tp>0.4){ctx.strokeStyle='#ef4444';ctx.lineWidth=1.8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(24,0);ctx.moveTo(24,0);ctx.lineTo(28,-4);ctx.moveTo(24,0);ctx.lineTo(28,4);ctx.stroke();}
    ctx.fillStyle='#1d3516';ctx.beginPath();ctx.ellipse(0,0,14,9,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#ebd18a';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#d9a73d';ctx.beginPath();ctx.ellipse(-3,0,8,3,0,0,Math.PI*2);ctx.fill();
    [-4.5,4.5].forEach(ey=>{ctx.fillStyle='#ffde38';ctx.beginPath();ctx.arc(3,ey,2.8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#06060b';ctx.beginPath();ctx.ellipse(3,ey,0.8,2.4,0.2,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(2,ey-0.8,0.5,0,Math.PI*2);ctx.fill();});
    ctx.restore();
    requestAnimationFrame(renderFrame);
  }
  renderFrame();
})();
</script>
